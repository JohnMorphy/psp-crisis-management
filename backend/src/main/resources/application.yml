spring:
  application:
    name: gis-map
  datasource:
    # POSTGRES_HOST domyślnie "localhost" (tryb dev lokalny).
    # W docker-compose.full.yml ustaw POSTGRES_HOST=postgres (nazwa serwisu Docker).
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:gis_dashboard}
    username: ${POSTGRES_USER:lublin}
    password: ${POSTGRES_PASSWORD:lublin123}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
